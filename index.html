<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>일본어 공부</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/static/pretendard.min.css"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="topbar">
        <div>
          <h1>일본어 공부</h1>
        </div>
        <button id="openWordStudyButton" class="secondary-button" type="button">단어 공부하기</button>
      </section>

      <section id="kanjiStudy" class="study-view">
      <div class="view-head">
        <h2>한자 공부</h2>
      </div>
      <section class="controls" aria-label="퀴즈 설정">
        <label>
          문제 유형
          <select id="modeSelect">
            <option value="kanjiToAnswer">한자 보고 뜻음 맞추기</option>
            <option value="answerToKanji">뜻음 보고 한자 맞추기</option>
            <option value="kanjiToInput">한자 보고 직접 쓰기</option>
          </select>
        </label>
        <div class="range-controls">
          <label>
            시작 번호
            <input id="rangeStartInput" type="number" min="1" value="1" />
          </label>
          <label>
            끝 번호
            <input id="rangeEndInput" type="number" min="1" value="1" />
          </label>
          <button id="rangeApplyButton" type="button">범위 적용</button>
        </div>
      </section>

      <section class="quiz" aria-live="polite">
        <div class="progress">
          <span id="progressText">문제 1</span>
          <span id="currentNumberText">현재 1번</span>
          <span id="rangeText">1-1번</span>
          <span id="wrongText">현재 범위 오답 0개</span>
        </div>

        <div class="question-card">
          <p id="questionLabel" class="question-label">이 한자의 뜻음은?</p>
          <div id="questionText" class="question-text">木</div>
        </div>

        <div id="choices" class="choices"></div>

        <form id="typedAnswerForm" class="typed-answer" hidden>
          <label>
            답 입력
            <input id="typedAnswerInput" type="text" autocomplete="off" />
          </label>
          <button id="typedAnswerButton" type="submit">정답 확인</button>
        </form>

        <div id="feedback" class="feedback" role="status"></div>

        <div class="actions">
          <button id="nextButton" type="button">다음 문제</button>
          <button id="wrongOnlyButton" type="button">오답만 다시 풀어보기</button>
          <button id="resetButton" type="button">기록 초기화</button>
        </div>
      </section>
      </section>

      <section id="wordStudy" class="word-study study-view" hidden>
        <div class="word-study-header">
          <div>
            <h2>단어 공부</h2>
          </div>
          <button id="backToKanjiButton" class="secondary-button" type="button">한자 공부로</button>
        </div>

        <section class="controls" aria-label="단어 설정">
          <div class="range-controls">
            <label>
              시작 번호
              <input id="wordRangeStartInput" type="number" min="1" value="1" />
            </label>
            <label>
              끝 번호
              <input id="wordRangeEndInput" type="number" min="1" value="1" />
            </label>
            <button id="wordRangeApplyButton" type="button">범위 적용</button>
          </div>
          <label>
            검색
            <input id="wordSearchInput" type="search" placeholder="번호, 일본어, 한자, 뜻 검색" />
          </label>
        </section>

        <div class="word-summary">
          <span id="wordSummaryText">총 0개</span>
          <span id="wordRangeText">1-1번</span>
        </div>

        <article class="word-card">
          <div class="word-card-number" id="wordCardNumber">1번</div>
          <div class="word-card-main">
            <p class="word-label">일본어</p>
            <strong id="wordCardWord">あいさつ</strong>
          </div>
          <div class="word-card-detail">
            <div>
              <span>한자</span>
              <strong id="wordCardKanji">漢字</strong>
            </div>
            <div>
              <span>뜻</span>
              <strong id="wordCardMeaning">의미</strong>
            </div>
          </div>
        </article>

        <div id="wordEmptyState" class="word-empty" hidden>조건에 맞는 단어가 없어요.</div>

        <div class="actions word-card-actions">
          <button id="prevWordButton" type="button">이전 단어</button>
          <button id="nextWordButton" type="button">다음 단어</button>
        </div>
      </section>

    </main>

    <aside id="reviewPanel" class="review-panel" aria-hidden="true">
      <div class="review-header">
        <div>
          <p class="eyebrow">오답 복습</p>
          <h2>틀린 것만 다시 풀기</h2>
        </div>
        <button id="closeReviewButton" class="icon-button" type="button" aria-label="오답 복습 닫기">×</button>
      </div>

      <div class="review-progress">
        <span id="reviewProgressText">문제 1 / 1</span>
        <span id="reviewNumberText">현재 1번</span>
      </div>

      <div class="review-question-card">
        <p id="reviewQuestionLabel" class="question-label">이 한자의 뜻음은?</p>
        <div id="reviewQuestionText" class="question-text">木</div>
      </div>

      <div id="reviewChoices" class="choices"></div>
      <div id="reviewFeedback" class="feedback" role="status"></div>

      <div class="actions review-actions">
        <button id="reviewNextButton" type="button">다음 오답</button>
      </div>
    </aside>

    <div id="reviewOverlay" class="review-overlay" hidden></div>

    <script src="./data.js"></script>
    <script src="./word-data.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
